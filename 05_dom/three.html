<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating new element </title>
</head>
<body style="background-color: black; color: white;">
    
</body>

<script>
    const div = document.createElement('div')                            // creating a new element
    console.log(div);                                                    //
    div.className = "main"                                               // asssigning class to the div
    // div.id = "myId"                                                      // assigning id to the div
    
    div.id = Math.round(Math.random() * 10 + 1)                          // using maths library function 
    
    div.setAttribute("title" , "generated title")                        // setAttribute : to set any attribute 
    div.style.backgroundColor = "green"
    div.style.padding = "12px"

   // div.innerText = "Prashant Yadav"                                     // to create text to the div
    const addText = document.createTextNode("Prashant Yadav")              // more efficient  way to create text 
    div.appendChild(addText)                                               // to attach the created text

    document.body.appendChild(div)                                         // to attach / add div to the body / document



</script>

</html>
